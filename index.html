<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>だれの近況？</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

:root{
  --paper:#F6EFDD;
  --paper-deep:#EBDFC1;
  --card:#FFFBF1;
  --line:#D9C9A0;
  --ink:#2B3A55;
  --ink-soft:#5B6B87;
  --ink-faint:#95A0B2;
  --stamp:#C13B2A;
  --stamp-deep:#8F2C1F;
  --gold:#D89B3C;
  --shadow: rgba(43,58,85,0.16);
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background: var(--paper);
  font-family:'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  color: var(--ink);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding: 28px 16px calc(28px + env(safe-area-inset-bottom));
  line-height:1.65;
  -webkit-tap-highlight-color: transparent;
}
button{ font: inherit; -webkit-tap-highlight-color: transparent; }
*:focus-visible{ outline: 3px solid var(--gold); outline-offset: 2px; }

.container{ width:100%; max-width: 440px; }
.container.wide-container{ max-width: 440px; }
@media (min-width: 620px){
  .container.wide-container{ max-width: 640px; }
}
@media (min-width: 860px){
  .container.wide-container{ max-width: 820px; }
  table.league{ font-size:13.5px; }
  table.league th, table.league td{ padding:9px 12px; min-width:42px; }
}

.card{
  background: var(--card);
  border-radius: 20px;
  padding: 28px 22px 26px 40px;
  box-shadow: 0 14px 34px var(--shadow), 0 1px 0 var(--line);
  position: relative;
}
.card::before{
  content:'';
  position:absolute;
  left: 22px;
  top: 18px;
  bottom: 18px;
  width: 2px;
  background: var(--stamp);
  opacity: 0.5;
}
.card.center-card{ text-align:center; }
.back-link{
  position:absolute; top:14px; right:16px;
  background:none; border:none; color: var(--ink-soft);
  font-size:12px; font-weight:700; cursor:pointer; padding:4px 6px;
}
.back-link:active{ opacity:0.6; }

.eyebrow{ font-size: 12.5px; font-weight: 700; letter-spacing: 0.06em; color: var(--ink-soft); margin-bottom: 6px; }
.display-title{ font-family:'Kaisei Tokumin', serif; font-weight: 700; font-size: 28px; margin: 0 0 12px; letter-spacing: 0.01em; }
.section-title{ font-family:'Kaisei Tokumin', serif; font-weight: 700; font-size: 21px; margin: 0 0 10px; }
.lead{ margin: 0 0 20px; color: var(--ink); font-size: 15px; }
.hint{ margin: 0 0 16px; color: var(--ink-soft); font-size: 13.5px; }
.hint code{ background: var(--paper-deep); padding:2px 5px; border-radius:5px; font-size:12px; }
.error-text{ color: var(--stamp-deep); font-size: 13.5px; margin: -8px 0 14px; font-weight:600; }

.title-stamp{
  width: 54px; height: 54px;
  border-radius: 46% 54% 52% 48% / 55% 45% 58% 42%;
  border: 3px solid var(--stamp);
  color: var(--stamp);
  display:flex; align-items:center; justify-content:center;
  font-family:'Kaisei Tokumin', serif; font-weight:700; font-size: 22px;
  transform: rotate(-8deg);
  margin: 0 auto 14px;
}
.card:not(.center-card) .title-stamp{ margin: 0 0 14px; }

.btn-primary{
  display:block; width:100%;
  background: var(--ink); color: var(--paper);
  border:none; border-radius:999px;
  padding: 14px 22px; font-weight:700; font-size:16px;
  cursor:pointer; min-height:50px;
  transition: transform .15s ease, opacity .15s ease;
}
.btn-primary:disabled{ opacity:0.35; cursor:not-allowed; }
.btn-primary:not(:disabled):active{ transform: scale(0.97); }
.input-row .btn-primary{ width:auto; flex:0 0 auto; padding:12px 18px; }

.btn-outline{
  display:block; width:100%;
  background: transparent; border: 1.5px solid var(--ink); color: var(--ink);
  border-radius:999px; padding: 12px 18px; font-weight:700; font-size:14.5px;
  cursor:pointer; white-space:nowrap; margin-top: 10px;
}
.btn-outline:active{ transform: scale(0.97); }
.input-row .btn-outline{ width:auto; flex:0 0 auto; margin-top:0; }

.btn-row{ display:flex; gap:10px; margin-top: 6px; }
.btn-row .btn-outline{ flex: 1; margin-top:0; }
.btn-row .btn-primary{ flex: 1; }

.input-row{ display:flex; gap:8px; margin-bottom: 10px; }
.input-row input{
  flex:1; min-width:0;
  padding: 12px 12px; border: 1.5px solid var(--line); border-radius:10px;
  font: inherit; font-size:15px; background: var(--paper);
  color: var(--ink);
}

/* QR / join */
.qr-box{
  background: var(--paper-deep); border-radius:16px; padding:18px;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  margin-bottom: 20px;
}
.qr-canvas{ background:#fff; padding:8px; border-radius:10px; line-height:0; }
.qr-box .input-row{ width:100%; margin-bottom:0; }
.qr-caption{ font-size:12.5px; color: var(--ink-soft); text-align:center; }
.link-row{ display:flex; gap:8px; width:100%; }
.link-input{
  flex:1; min-width:0; padding:10px 10px; border:1.5px solid var(--line);
  border-radius:8px; font-size:12px; background: var(--card); color: var(--ink-soft);
}
.link-row .btn-outline{ margin-top:0; }

.resume-block{ margin-bottom: 16px; }
.chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 14px; }

.pending-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:10px; }
.pending-row{ display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; }
.exclude-link{
  background:none; border:none; color: var(--ink-faint); font-size:11.5px;
  text-decoration:underline; cursor:pointer; padding:2px 4px;
}
.exclude-confirm{ background: var(--paper-deep); border-radius:14px; padding:14px; text-align:center; }
.hint.small-note{ font-size:12px; margin-top:4px; margin-bottom:0; }
.chip{ border-radius:999px; padding:9px 16px; font-size:14px; font-weight:600; }
.resume-chip{ border:1.5px solid var(--stamp); background: rgba(193,59,42,0.07); color: var(--stamp-deep); cursor:pointer; }
.static-chip{ border:1.5px dashed var(--line); background: var(--card); color: var(--ink); }

.count-note{ font-size:13px; color: var(--ink-soft); margin: 6px 0 16px; }

/* Preset question picker */
.preset-list{ display:flex; flex-direction:column; gap:9px; margin-bottom: 14px; }
.preset-item{
  display:flex; align-items:flex-start; gap:10px;
  border: 1.5px dashed var(--line); border-radius:14px;
  padding: 12px 12px; cursor:pointer; background: var(--card);
  transition: border-color .15s ease, background .15s ease, opacity .15s ease;
}
.preset-item.selected{ border-style: solid; border-color: var(--stamp); background: rgba(193,59,42,0.07); }
.preset-item.locked{ opacity:0.4; cursor:default; }
.preset-check{
  width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; color: var(--stamp-deep); font-weight:700; margin-top:1px;
}
.preset-item.selected .preset-check{ border-color: var(--stamp); }
.preset-q{ font-size:14.5px; font-weight:700; color: var(--ink); }
.preset-hint{ font-size:12px; color: var(--ink-soft); margin-top:2px; }

/* Answer form */
.qa-block{ margin-bottom: 16px; }
.qa-label{ display:block; font-size:14px; font-weight:700; margin-bottom:6px; }
.table-title{ margin-top: 6px; }
.ruled-input{
  width:100%; border: 1.5px solid var(--line); border-radius:8px;
  padding: 6px 10px; font: inherit; font-size:15px; color: var(--ink);
  line-height:28px; resize:vertical;
  background-color: var(--card);
  background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, var(--line) 27px, var(--line) 28px);
}

/* Progress + answer cards */
.progress-track{ height:6px; background: var(--paper-deep); border-radius:6px; overflow:hidden; margin: 10px 0 18px; }
.progress-fill{ height:100%; background: var(--stamp); transition: width .4s ease; border-radius:6px; }
.q-label{ font-size:13.5px; font-weight:700; color: var(--ink-soft); margin-bottom:8px; }
.answer-card{ background: var(--paper-deep); border: 1.5px dashed var(--line); border-radius:14px; padding: 20px 18px; font-size:18px; font-weight:500; margin-bottom: 16px; color: var(--ink); }
.answer-set{ display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.set-item .small-answer{ padding:14px 16px; font-size:15.5px; margin-bottom:0; }
.no-answer{ color: var(--ink-faint); font-style: normal; }

/* Guessing grid */
.guess-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap:9px; margin-bottom:6px; }
.guess-chip{
  border: 1.5px dashed var(--line); background: var(--card); border-radius:14px;
  padding: 12px 8px; font-weight:600; font-size:13.5px; color: var(--ink);
  cursor:pointer; transition: all .2s ease;
}
.guess-chip.chosen{
  border-style: solid; border-color: var(--stamp); background: rgba(193,59,42,0.1);
  color: var(--stamp-deep); font-weight:700;
}
.guess-chip.elsewhere{ opacity:0.55; }
.chip-note{ display:block; font-size:10.5px; font-weight:500; color: var(--ink-faint); margin-top:2px; }

/* Swipeable card navigation */
.dots-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom: 6px; }
.dot{
  width:28px; height:28px; border-radius:50%; border:1.5px dashed var(--line);
  background: var(--card); color: var(--ink-soft); font-size:12px; font-weight:700;
  cursor:pointer; padding:0;
}
.dot.assigned{ border-style:solid; border-color: var(--stamp); background: rgba(193,59,42,0.08); color: var(--stamp-deep); }
.dot.current{ box-shadow: 0 0 0 2px var(--ink); }
.nav-row{ display:flex; gap:10px; margin: 14px 0 10px; }
.nav-row .btn-outline{ flex:1; margin-top:0; }
#guessCardArea{ touch-action: pan-y; }

/* Stamp reveal */
.stamp-wrap{ display:flex; justify-content:center; margin: 18px 0 10px; }
.stamp{
  width:118px; height:118px;
  border-radius: 46% 54% 52% 48% / 55% 45% 58% 42%;
  border: 4px solid var(--stamp); color: var(--stamp);
  display:flex; align-items:center; justify-content:center;
  font-family:'Kaisei Tokumin', serif; font-weight:700; font-size:21px;
  background: radial-gradient(circle at 50% 40%, rgba(193,59,42,0.07), transparent 70%);
  transform: rotate(-10deg) scale(0);
  animation: stampIn .5s cubic-bezier(.2,1.4,.4,1) forwards;
}
.stamp.miss{ border-color: var(--ink-soft); color: var(--ink-soft); background: radial-gradient(circle at 50% 40%, rgba(91,107,135,0.07), transparent 70%); }
@keyframes stampIn{
  0%{ transform: rotate(-10deg) scale(0); opacity:0; }
  60%{ transform: rotate(-10deg) scale(1.15); opacity:1; }
  100%{ transform: rotate(-10deg) scale(1); opacity:1; }
}
@media (prefers-reduced-motion: reduce){ .stamp{ animation:none; transform: rotate(-10deg) scale(1); } }
.reveal-text{ text-align:center; font-size:15px; margin: 0 0 18px; }

/* Score & awards */
.score-big{ font-family:'Kaisei Tokumin', serif; font-weight:700; font-size:44px; color: var(--stamp-deep); margin: 6px 0 4px; }
.score-big.small-score{ font-size:34px; }
.score-unit{ font-size:14px; font-weight:500; color: var(--ink-soft); margin-left:6px; }
.award-row{ background: var(--paper-deep); border-radius:14px; padding: 14px; text-align:center; margin-top: 14px; }
.award-badge{ font-size:13px; font-weight:700; color: var(--ink-soft); margin-bottom:4px; }
.award-entries{ display:flex; flex-direction:column; gap:8px; }
.award-entry{ padding-top:6px; }
.award-entry + .award-entry{ border-top: 1px dashed var(--line); }
.award-name{ font-family:'Kaisei Tokumin', serif; font-size:19px; font-weight:700; }
.award-sub{ font-size:13px; color: var(--ink-soft); margin-top:2px; }

/* League table */
.league-wrap{ overflow-x:auto; margin: 10px 0 4px; border-radius:10px; }
table.league{ border-collapse:collapse; font-size:12px; width:100%; }
table.league th, table.league td{ border:1px solid var(--line); padding:7px 9px; text-align:center; min-width:36px; }
table.league th{ background: var(--paper-deep); font-weight:700; white-space:nowrap; font-size:11.5px; }
table.league th.row-head{ text-align:left; background: var(--card); }
table.league th.corner{ font-size:10px; color: var(--ink-soft); font-weight:600; }
table.league td.self{ background: var(--ink); }
table.league td.correct{ color: var(--stamp-deep); font-weight:700; background: rgba(193,59,42,0.08); }
table.league td.incorrect{ color: var(--ink-soft); }
table.league td.pending{ color: var(--ink-faint); }
.reset-block{ margin-top: 22px; padding-top: 18px; border-top: 1px dashed var(--line); }


@media (max-width: 380px){
  .card{ padding: 24px 16px 22px 34px; }
  .display-title{ font-size:24px; }
  .score-big{ font-size:38px; }
}

</style>
</head>
<body>
<div id="app"></div>
<script>
// ==================== Data ====================
const FIXED_QUESTIONS = [
  { id: 'q1', text: '最近ハマっていることは何ですか' },
  { id: 'q2', text: '最近人に喜ばれたことは何ですか' },
  { id: 'q3', text: '大学入学時に戻れたら、最初に何をしますか' },
];

// ==================== Global (per-device) state ====================
let me = { id: null, name: null };

function defaultCache() {
  return {
    participants: [],       // [{id,name,joinedAt}]
    questions: null,        // [{id,text}] length 3, once game started
    answeredIds: new Set(), // ids who have submitted answers
    guessedIds: new Set(),  // ids who have submitted guesses
    allGuesses: {},         // { guesserId: { targetId: guessedId } }
    resultsLoaded: false,
  };
}
let cache = defaultCache();

function defaultUi() {
  return {
    loading: true,
    joinError: null,
    copied: false,
    answerError: null,
    guessQueue: [],
    cardIndex: 0,
    assignments: {},        // targetId -> candidateId (editable until confirmed)
    confirmingExcludeId: null,
    confirmingReset: false,
  };
}
let ui = defaultUi();

let guessSetupInFlight = false;
let resultsLoadInFlight = false;
let pollTimer = null;

const app = document.getElementById('app');

// ==================== Helpers ====================
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, function (ch) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return map[ch];
  });
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function shortName(name) {
  return name.length > 4 ? name.slice(0, 3) + '…' : name;
}

// ==================== Storage helpers (backed by Google Apps Script) ====================
// ▼▼▼ デプロイ後、あなたのGASウェブアプリのURLに書き換えてください ▼▼▼
const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbzFDvDgiDJh0dgcoaxroOBNI55gkWZN69Db4nEO5Kp9L12gIDKJVMV2PLDvcIQ6bSqVQw/exec';
// ▲▲▲ 例: https://script.google.com/macros/s/AKfycb.../exec ▲▲▲

async function gasCall(params) {
  const p = Object.assign({ _ts: Date.now() }, params);
  const url = GAS_ENDPOINT + '?' + new URLSearchParams(p).toString();
  const res = await fetch(url, { method: 'GET', cache: 'no-store' });
  if (!res.ok) throw new Error('GAS request failed: ' + res.status);
  return res.json();
}
async function kvGet(key) {
  try {
    const r = await gasCall({ action: 'get', key });
    if (!r || r.value === null || r.value === undefined) return null;
    return JSON.parse(r.value);
  } catch (e) { console.error('kvGet failed', key, e); return null; }
}
async function kvSet(key, value) {
  try {
    const r = await gasCall({ action: 'set', key, value: JSON.stringify(value) });
    return !!(r && r.ok);
  } catch (e) { console.error('kvSet failed', key, e); return false; }
}
async function kvDelete(key) {
  try { await gasCall({ action: 'delete', key }); } catch (e) { /* ignore */ }
}
async function kvListKeys(prefix) {
  try {
    const r = await gasCall({ action: 'list', prefix });
    return (r && r.keys) ? r.keys : [];
  } catch (e) { console.error('kvListKeys failed', prefix, e); return []; }
}
async function kvResetAll() {
  try { await gasCall({ action: 'resetAll' }); } catch (e) { /* ignore */ }
}

// ==================== Data refresh ====================
async function refreshRoster() {
  const keys = await kvListKeys('dk_participant:');
  const list = [];
  for (const k of keys) {
    const val = await kvGet(k);
    if (val) list.push(val);
  }
  list.sort((a, b) => a.joinedAt - b.joinedAt);
  cache.participants = list;
}
async function refreshQuestions() {
  cache.questions = await kvGet('dk_questions');
}
async function refreshAnsweredIds() {
  const keys = await kvListKeys('dk_answers:');
  cache.answeredIds = new Set(keys.map(k => k.replace('dk_answers:', '')));
}
async function refreshResultsData() {
  const keys = await kvListKeys('dk_guesses:');
  const allGuesses = {};
  for (const k of keys) {
    const gid = k.replace('dk_guesses:', '');
    const val = await kvGet(k);
    if (val) allGuesses[gid] = val;
  }
  cache.allGuesses = allGuesses;
  cache.guessedIds = new Set(Object.keys(allGuesses));
}

// ==================== Derived phase ====================
function myPhase() {
  if (!me.id) return 'join';
  if (!cache.questions) return 'lobby';
  if (!cache.answeredIds.has(me.id)) return 'answering';
  if (cache.answeredIds.size < cache.participants.length) return 'waitingAnswers';
  if (!cache.guessedIds.has(me.id)) return 'guessing';
  if (cache.guessedIds.size < cache.participants.length) return 'waitingGuesses';
  return 'results';
}

// ==================== Init & polling ====================
function saveMyIdLocally(id) {
  try { localStorage.setItem('dk_myId', id); } catch (e) { /* ignore */ }
}
function loadMyIdLocally() {
  try { return localStorage.getItem('dk_myId'); } catch (e) { return null; }
}
function clearMyIdLocally() {
  try { localStorage.removeItem('dk_myId'); } catch (e) { /* ignore */ }
}

async function init() {
  if (GAS_ENDPOINT.indexOf('PASTE_YOUR') === 0) { renderApp(); return; }
  ui.loading = true; renderApp();
  await refreshRoster();
  if (!me.id) {
    const savedId = loadMyIdLocally();
    if (savedId) {
      const p = cache.participants.find(x => x.id === savedId);
      if (p) { me.id = p.id; me.name = p.name; }
    }
  }
  await refreshQuestions();
  if (cache.questions) await refreshAnsweredIds();
  if (me.id && cache.questions && cache.answeredIds.size >= cache.participants.length) {
    await refreshGuessedIdsList();
  }
  ui.loading = false;
  renderApp();
  startPolling();
}
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(pollTick, 4000);
}
async function pollTick() {
  try {
    if (!cache.questions) {
      await refreshRoster();
      await refreshQuestions();
    } else if (me.id && cache.answeredIds.size < cache.participants.length) {
      await refreshAnsweredIds();
      await refreshRoster();
      await refreshQuestions();
    } else if (me.id && myPhase() === 'waitingGuesses') {
      await refreshGuessedIdsList();
      await refreshRoster();
      await refreshQuestions();
    } else if (me.id && myPhase() === 'results') {
      await refreshResultsData();
      await refreshRoster();
      await refreshQuestions();
    }
    // Someone used "最初からやり直す" from another device: the server side
    // has been wiped clean (no questions, no participants) while this device
    // still thinks a game is in progress. Snap back to the join screen.
    if (me.id && !cache.questions && cache.participants.length === 0) {
      me = { id: null, name: null };
      clearMyIdLocally();
      cache = defaultCache();
      ui = defaultUi();
      ui.loading = false;
    }
  } catch (e) { console.error(e); }
  const active = document.activeElement;
  const isTyping = active && app.contains(active) && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA');
  if (!isTyping) renderApp();
}
async function refreshGuessedIdsList() {
  const keys = await kvListKeys('dk_guesses:');
  cache.guessedIds = new Set(keys.map(k => k.replace('dk_guesses:', '')));
}

// ==================== Actions: exclude a participant who can't continue ====================
function askExcludeParticipant(id) {
  ui.confirmingExcludeId = id;
  renderApp();
}
function cancelExcludeParticipant() {
  ui.confirmingExcludeId = null;
  renderApp();
}
async function confirmExcludeParticipant(id) {
  ui.confirmingExcludeId = null;
  ui.loading = true; renderApp();
  await kvDelete('dk_participant:' + id);
  await kvDelete('dk_answers:' + id);
  await kvDelete('dk_guesses:' + id);
  await refreshRoster();
  await refreshAnsweredIds();
  await refreshGuessedIdsList();
  ui.loading = false;
  renderApp();
}
function renderExcludeUi(pending) {
  return pending.map(p => {
    if (ui.confirmingExcludeId === p.id) {
      return `
      <div class="exclude-confirm">
        <div class="hint">${escapeHtml(p.name)}さんを除外して、残りのメンバーだけで進めます。よろしいですか？</div>
        <div class="btn-row">
          <button class="btn-outline" onclick="cancelExcludeParticipant()">キャンセル</button>
          <button class="btn-primary" onclick="confirmExcludeParticipant('${p.id}')">除外する</button>
        </div>
      </div>`;
    }
    return `
    <div class="pending-row">

// ==================== Actions: guessing ====================
async function triggerGuessSetup() {
  if (guessSetupInFlight) return;
  guessSetupInFlight = true;
  ui.loading = true; renderApp();
  const others = cache.participants.filter(p => p.id !== me.id);
  const queue = [];
  for (const p of others) {
    const ans = await kvGet('dk_answers:' + p.id);
    queue.push({ pid: p.id, answers: ans || {} });
  }
  ui.guessQueue = shuffle(queue);
  ui.cardIndex = 0;
  ui.assignments = {};
  ui.loading = false;
  guessSetupInFlight = false;
  renderApp();
}
function goToPrevCard() {
  if (ui.cardIndex > 0) { ui.cardIndex--; renderApp(); }
}
function goToNextCard() {
  if (ui.cardIndex < ui.guessQueue.length - 1) { ui.cardIndex++; renderApp(); }
}
function jumpToCard(i) {
  if (i >= 0 && i < ui.guessQueue.length) { ui.cardIndex = i; renderApp(); }
}
function chooseCandidateForCurrentCard(candidateId) {
  const target = ui.guessQueue[ui.cardIndex];
  const targetId = target.pid;
  // If this candidate is already assigned to a different set, free them up from there (steal).
  Object.keys(ui.assignments).forEach(tid => {
    if (tid !== targetId && ui.assignments[tid] === candidateId) delete ui.assignments[tid];
  });
  // Tapping the already-chosen candidate for this card un-assigns it.
  if (ui.assignments[targetId] === candidateId) {
    delete ui.assignments[targetId];
  } else {
    ui.assignments[targetId] = candidateId;
  }
  renderApp();
}
let confirmGuessesInFlight = false;
async function confirmAllGuesses() {
  if (confirmGuessesInFlight) return;
  if (Object.keys(ui.assignments).length < ui.guessQueue.length) return;
  confirmGuessesInFlight = true;
  ui.loading = true; renderApp();
  const ok = await kvSet('dk_guesses:' + me.id, ui.assignments);
  if (ok) cache.guessedIds.add(me.id);
  ui.loading = false;
  confirmGuessesInFlight = false;
  renderApp();
}

// ==================== Actions: results ====================
async function triggerResultsLoad() {
  if (resultsLoadInFlight) return;
  resultsLoadInFlight = true;
  await refreshResultsData();
  cache.resultsLoaded = true;
  resultsLoadInFlight = false;
  renderApp();
}
function computeResults() {
  const participants = cache.participants;
  const allGuesses = cache.allGuesses || {};
  const matrix = {};
  const guesserStats = {};
  const targetStats = {};
  participants.forEach(p => {
    guesserStats[p.id] = { correct: 0, total: 0, submitted: !!allGuesses[p.id] };
    targetStats[p.id] = { correct: 0, total: 0 };
    matrix[p.id] = {};
  });
  participants.forEach(g => {
    participants.forEach(t => {
      if (g.id === t.id) { matrix[g.id][t.id] = 'self'; return; }
      const guessesByG = allGuesses[g.id];
      if (!guessesByG || guessesByG[t.id] === undefined) { matrix[g.id][t.id] = 'pending'; return; }
      const isCorrect = guessesByG[t.id] === t.id;
      matrix[g.id][t.id] = isCorrect ? 'correct' : 'incorrect';
      guesserStats[g.id].total++;
      if (isCorrect) guesserStats[g.id].correct++;
      targetStats[t.id].total++;
      if (isCorrect) targetStats[t.id].correct++;
    });
  });
  return { matrix, guesserStats, targetStats };
}
function computeAwards(guesserStats, targetStats, participants) {
  let bestAcc = -1, exposedMax = -1, mysteryMin = Infinity;
  let bestList = [], exposedList = [], mysteryList = [];
  participants.forEach(p => {
    const gs = guesserStats[p.id];
    if (gs.submitted && gs.total > 0) {
      const acc = gs.correct / gs.total;
      const entry = { p, acc, correct: gs.correct, total: gs.total };
      if (acc > bestAcc) { bestAcc = acc; bestList = [entry]; }
      else if (acc === bestAcc) { bestList.push(entry); }
    }
    const ts = targetStats[p.id];
    if (ts.total > 0) {
      const exp = ts.correct / ts.total;
      const entry = { p, exp, correct: ts.correct, total: ts.total };
      if (exp > exposedMax) { exposedMax = exp; exposedList = [entry]; }
      else if (exp === exposedMax) { exposedList.push(entry); }
      if (exp < mysteryMin) { mysteryMin = exp; mysteryList = [entry]; }
      else if (exp === mysteryMin) { mysteryList.push(entry); }
    }
  });
  // If everyone tied at the same exposure ratio, exposedList and mysteryList would be
  // the exact same people — showing the same names under two different awards is confusing,
  // so drop the mystery badge in that case.
  const sameIds = (a, b) => {
    if (a.length !== b.length) return false;
    const idsA = a.map(x => x.p.id).sort().join(',');
    const idsB = b.map(x => x.p.id).sort().join(',');
    return idsA === idsB;
  };
  const showMystery = !(exposedList.length && mysteryList.length && sameIds(exposedList, mysteryList));
  return { bestList, exposedList, mysteryList: showMystery ? mysteryList : [] };
}

// ==================== Render dispatch ====================
function renderScreen() {
  if (GAS_ENDPOINT.indexOf('PASTE_YOUR') === 0) return screens.setupNeeded();
  if (ui.loading) return screens.loading();
  const phase = myPhase();
  if (phase === 'join') return screens.join();
  if (phase === 'lobby') return screens.lobby();
  if (phase === 'answering') return screens.answering();
  if (phase === 'waitingAnswers') return screens.waitingAnswers();
  if (phase === 'guessing') {
    if (ui.guessQueue.length === 0) { triggerGuessSetup(); return screens.loading(); }
    return screens.guessing();
  }
  if (phase === 'waitingGuesses') return screens.waitingGuesses();
  if (phase === 'results') {
    if (!cache.resultsLoaded) { triggerResultsLoad(); return screens.loading(); }
    return screens.results();
  }
  return screens.loading();
}
function attachSwipeHandlers() {
  const el = document.getElementById('guessCardArea');
  if (!el) return;
  let startX = null, startY = null;
  el.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', (e) => {
    if (startX === null) return;
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - startX;
    const dy = endY - startY;
    startX = null; startY = null;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) goToNextCard(); else goToPrevCard();
  }, { passive: true });
}
function renderApp() {
  app.innerHTML = renderScreen();
  if (!ui.loading && myPhase() === 'join') setupQrCode();
  if (!ui.loading && myPhase() === 'guessing' && ui.guessQueue.length > 0) attachSwipeHandlers();
}

init();

</script>
</body>
